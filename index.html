:root {
  --ink:     #0b0b10;
  --surface: #13131a;
  --card:    #1a1a24;
  --border:  rgba(255,255,255,0.10);
  --paper:   #edeae0;
  --muted:   rgba(237,234,224,0.40);
  --accent:  #c8f000;   /* bright lime — the GO color */
  --glow:    rgba(200,240,0,0.55);
  --amber:   #f0a030;
  --red:     #f05050;
  --glass:   rgba(11,11,16,0.72);
  --radius:  12px;
}

html, body {
  height: 100%; width: 100%;
  background: var(--ink);
  font-family: 'DM Mono', monospace;
  color: var(--paper);
  overflow: hidden;
}

/* ── MAP always full-screen behind everything ── */
#map { position: fixed; inset: 0; z-index: 0; }

/* ── HEADER ── */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 14px 14px 0;
  pointer-events: none;
}

#hud-inner {
  background: rgba(11,11,16,0.78);
  border: 1px solid rgba(200,240,0,0.18);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: var(--radius);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: all;
  /* subtle green top glow on the card */
  box-shadow: 0 0 0 1px rgba(200,240,0,0.08), 0 -2px 20px rgba(200,240,0,0.06) inset;
}

#wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.22em;
  color: var(--accent);
  text-transform: uppercase;
  line-height: 1;
  text-shadow: 0 0 18px rgba(200,240,0,0.4);
}

#wordmark span {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.38rem;
  letter-spacing: 0.32em;
  color: var(--muted);
  margin-top: 4px;
  text-shadow: none;
}

#stats-row { display: flex; gap: 18px; align-items: center; }

.stat { text-align: right; }

.stat-val {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--paper);
  line-height: 1;
  transition: color 0.25s;
}
.stat-val.live { color: var(--accent); text-shadow: 0 0 12px rgba(200,240,0,0.5); }
.stat-val.dim  { color: var(--muted); text-shadow: none; }

.stat-label {
  font-size: 0.38rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 3px;
}

/* ── DAY STRIP ── */
#day-wrap {
  position: fixed; top: 78px; left: 0; right: 0; z-index: 10;
  padding: 0 14px;
}

#day-strip {
  display: flex; gap: 7px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
}
#day-strip::-webkit-scrollbar { display: none; }

.day-chip {
  flex-shrink: 0;
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 7px 13px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(11,11,16,0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--muted);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.day-chip.has-data {
  border-color: rgba(200,240,0,0.28);
  color: rgba(237,234,224,0.75);
}
.day-chip.active {
  background: var(--accent);
  color: var(--ink);
  border-color: var(--accent);
  box-shadow: 0 2px 12px rgba(200,240,0,0.4);
}

/* ── PAST BANNER ── */
#past-banner {
  position: fixed; top: 122px; left: 50%; transform: translateX(-50%); z-index: 10;
  background: rgba(240,80,80,0.12);
  border: 1px solid rgba(240,80,80,0.32);
  backdrop-filter: blur(8px);
  border-radius: 6px;
  padding: 5px 14px;
  font-size: 0.46rem; letter-spacing: 0.16em;
  color: var(--red); text-transform: uppercase;
  display: none; white-space: nowrap;
}
#past-banner.visible { display: block; }

/* ── FABs ── */
.fab {
  position: fixed; z-index: 10;
  width: 46px; height: 46px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(11,11,16,0.80);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.2s, background 0.2s, transform 0.12s;
}
.fab:active { transform: scale(0.88); }
.fab.on {
  border-color: var(--accent);
  background: rgba(200,240,0,0.14);
  box-shadow: 0 0 12px rgba(200,240,0,0.3);
}

#btn-follow { bottom: 174px; right: 14px; }
#btn-units  {
  bottom: 174px; left: 14px;
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.58rem; letter-spacing: 0.08em;
  color: var(--paper);
}
#btn-places { bottom: 118px; right: 14px; }

/* ── DWELL ── */
#dwell-badge {
  position: fixed; bottom: 118px; left: 14px; z-index: 10;
  background: rgba(11,11,16,0.80);
  border: 1px solid rgba(200,240,0,0.2);
  backdrop-filter: blur(10px);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 0.50rem; letter-spacing: 0.1em;
  color: var(--muted); display: none;
}
#dwell-badge.visible { display: block; }
#dwell-badge strong { color: var(--accent); font-family: 'Syne', sans-serif; }

/* ── BOTTOM CONTROLS ── */
#controls {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 12px 14px 36px;
  display: flex; gap: 10px; align-items: stretch;
  background: linear-gradient(to top, rgba(11,11,16,0.97) 55%, transparent 100%);
}

/* START TRACKING — the green light */
#btn-track {
  flex: 1;
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 0.82rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: #0b0b10;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, background 0.2s;
  animation: breathe 2.6s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% {
    box-shadow:
      0 0 0 2px rgba(200,240,0,0.15),
      0 4px 18px rgba(200,240,0,0.55),
      0 10px 50px rgba(200,240,0,0.28);
  }
  50% {
    box-shadow:
      0 0 0 4px rgba(200,240,0,0.08),
      0 4px 28px rgba(200,240,0,0.78),
      0 14px 64px rgba(200,240,0,0.42);
  }
}
#btn-track:active { transform: scale(0.97); }
#btn-track.active {
  background: var(--red); color: #fff;
  box-shadow: 0 4px 22px rgba(240,80,80,0.5);
  animation: none;
}
#btn-track:disabled {
  opacity: 0.2; pointer-events: none;
  box-shadow: none; animation: none;
}

#btn-clear {
  font-family: 'DM Mono', monospace; font-size: 0.54rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
}
#btn-clear:hover   { color: var(--paper); border-color: rgba(255,255,255,0.2); }
#btn-clear:disabled{ opacity: 0.15; pointer-events: none; }

/* ── PULSE DOT ── */
.pulse-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(11,11,16,0.7);
  animation: pdot 2s infinite;
}
@keyframes pdot {
  0%   { box-shadow: 0 0 0 3px rgba(11,11,16,0.7), 0 0 0 0   rgba(200,240,0,0.7); }
  70%  { box-shadow: 0 0 0 3px rgba(11,11,16,0.7), 0 0 0 14px rgba(200,240,0,0); }
  100% { box-shadow: 0 0 0 3px rgba(11,11,16,0.7), 0 0 0 0   rgba(200,240,0,0); }
}

/* ── WELCOME CARD ── */
#welcome {
  position: fixed;
  top: 148px; left: 50%; transform: translateX(-50%);
  z-index: 12;
  background: rgba(11,11,16,0.86);
  border: 1px solid rgba(200,240,0,0.2);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-radius: 16px;
  padding: 22px 22px 18px;
  text-align: center;
  max-width: 272px; width: 82vw;
  display: none;
  box-shadow: 0 0 40px rgba(200,240,0,0.08);
}
#welcome.visible { display: block; }
#welcome h2 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 0.95rem; letter-spacing: 0.18em;
  color: var(--accent); margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(200,240,0,0.5);
}
#welcome p { font-size: 0.59rem; color: var(--muted); line-height: 1.9; }
#welcome-close {
  display: inline-block;
  margin-top: 14px;
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.52rem; letter-spacing: 0.14em;
  color: rgba(200,240,0,0.5);
  cursor: pointer; text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s;
}
#welcome-close:hover { color: var(--accent); }

/* ── PLACE SHEET OVERLAY ── */
#place-overlay {
  position: fixed; inset: 0; z-index: 18;
  background: rgba(0,0,0,0.5);
  display: none;
  -webkit-tap-highlight-color: transparent;
}
#place-overlay.show { display: block; }

/* ── PLACE SHEET ── */
#place-sheet {

/* ── PLACE POPUP ── */
#place-popup {

<script>
// ── CONFIG ──────────────────────────────────────────────
const TOKEN    = 'pk.eyJ1IjoidW5jb21tb25jb3dib3kiLCJhIjoiY21rNjN2c2R1MHFodjNkb2wybWxweGNvNyJ9.4j78jvsPEWDh-T19ZSeqMA';
const TICK     = 8000;
const MAX_DAYS = 14;
const PL_KEY   = 'fp_places_v1';

// ── UNITS ────────────────────────────────────────────────
let metric = localStorage.getItem('fp_units') !== 'mi';
const toDisp = km => metric ? km : km * 0.621371;
const uLbl   = ()  => metric ? 'km' : 'mi';

// ── DATE ─────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function todayKey() {
  const d = new Date();
  return `fp_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function keyLabel(key) {
  const [y,m,d] = key.replace('fp_','').split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((now - dt) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return dt.toLocaleDateString('en-US',{ month:'short', day:'numeric' });
}

function allKeys() {
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('fp_') && !k.includes('places') && !k.includes('units')) out.push(k);
  }
  return out.sort().reverse();
}

function loadDay(key) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : []; } catch { return []; }
}

function saveDay(key, pts) {
  try { localStorage.setItem(key, JSON.stringify(pts)); } catch {}
  const keys = allKeys();
  if (keys.length > MAX_DAYS) keys.slice(MAX_DAYS).forEach(k => localStorage.removeItem(k));
}

// ── PLACES ───────────────────────────────────────────────
let places = [];
try { places = JSON.parse(localStorage.getItem(PL_KEY) || '[]'); } catch {}
function savePlaces() { try { localStorage.setItem(PL_KEY, JSON.stringify(places)); } catch {} }

// ── STATE ────────────────────────────────────────────────
let tracking   = false;
let followMode = true;
let watchId    = null;
let tickId     = null;
let timerId    = null;
let startTime  = null;
let currentPos = null;
let dot        = null;
let pendingLL  = null;
let pMarkers   = [];
let activeDay  = todayKey();
let points     = loadDay(activeDay);

// ── MAP ──────────────────────────────────────────────────
mapboxgl.accessToken = TOKEN;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-80.19, 25.77],
  zoom: 14,
  attributionControl: false
});

map.addControl(new mapboxgl.AttributionControl({ compact:true }), 'top-right');

map.on('load', () => {
  addSources();
  buildStrip();
  drawPlaces();
  if (points.length > 1) { renderTrail(); flyLast(); }
  updateStats();
  updateUnits();
});

// ── SOURCES ──────────────────────────────────────────────
function addSources() {
  map.addSource('trail', { type:'geojson', data:fc([]) });

  map.addLayer({
    id:'trail-glow', type:'line', source:'trail',
    layout:{ 'line-cap':'round','line-join':'round' },
    paint:{
      'line-color':'#c8f000',
      'line-width':['*',['get','w'],4.5],
      'line-opacity':0.12, 'line-blur':12
    }
  });

  map.addLayer({
    id:'trail-line', type:'line', source:'trail',
    layout:{ 'line-cap':'round','line-join':'round' },
    paint:{
      'line-color':'#c8f000',
      'line-width':['get','w'],
      'line-opacity':0.88
    }
  });

  map.addSource('dwell', { type:'geojson', data:fc([]) });
  map.addLayer({
    id:'dwell-rings', type:'circle', source:'dwell',
    paint:{
      'circle-radius':['interpolate',['linear'],['get','n'],1,12,10,52],
      'circle-color':'#c8f000',
      'circle-opacity':['interpolate',['linear'],['get','n'],1,0.06,10,0.24],
      'circle-blur':1.5
    }
  }, 'trail-glow');
}

function fc(f) { return { type:'FeatureCollection', features:f }; }

// ── DAY STRIP ────────────────────────────────────────────
function buildStrip() {
  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  const keys = allKeys();
  if (!keys.includes(todayKey())) keys.unshift(todayKey());

  keys.forEach(key => {
    const chip = document.createElement('button');
    chip.className = 'day-chip';
    chip.textContent = keyLabel(key);
    chip.dataset.key = key;
    if (loadDay(key).length > 0) chip.classList.add('has-data');
    if (key === activeDay) chip.classList.add('active');
    chip.addEventListener('click', () => switchDay(key));
    strip.appendChild(chip);
  });
}

function switchDay(key) {
  if (tracking) stopTracking();
  activeDay = key; points = loadDay(key); startTime = null;

  document.querySelectorAll('.day-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.key === key)
  );

  const isToday = key === todayKey();
  document.getElementById('past-banner').classList.toggle('visible', !isToday);
  document.getElementById('btn-track').disabled = !isToday;
  document.getElementById('btn-clear').disabled = !isToday;
  document.querySelectorAll('.stat-val').forEach(el => el.classList.toggle('dim', !isToday));

  map.getSource('trail').setData(fc([]));
  map.getSource('dwell').setData(fc([]));
  document.getElementById('dwell-badge').classList.remove('visible');
  document.getElementById('stat-time').textContent = '—';

  if (points.length > 1) { renderTrail(); flyLast(); }
  else if (isToday) document.getElementById('welcome').classList.add('visible');
  updateStats();
}

// ── RENDER ───────────────────────────────────────────────
function renderTrail() {
  if (points.length < 2) return;
  const lines = [], dm = {};

  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i], b = points[i+1];
    const k = dkey(a);
    dm[k] = (dm[k]||0) + 1;
    lines.push({
      type:'Feature',
      geometry:{ type:'LineString', coordinates:[[a.lng,a.lat],[b.lng,b.lat]] },
      properties:{ w: Math.min(2 + (dm[k]||1)*0.85, 13) }
    });
  }

  map.getSource('trail').setData(fc(lines));
  map.getSource('dwell').setData(fc(
    Object.entries(dm).map(([k,n]) => {
      const [lat,lng] = k.split(',').map(Number);
      return { type:'Feature', geometry:{ type:'Point', coordinates:[lng,lat] }, properties:{ n } };
    })
  ));

  const mx = Math.max(...Object.values(dm));
  if (mx > 2) {
    document.getElementById('dwell-badge').classList.add('visible');
    document.getElementById('dwell-val').textContent = `${mx} passes`;
  }
}

function dkey(pt) {
  const r = 0.00015;
  return `${(Math.round(pt.lat/r)*r).toFixed(5)},${(Math.round(pt.lng/r)*r).toFixed(5)}`;
}

function flyLast() {
  if (!points.length) return;
  const p = points[points.length-1];
  map.flyTo({ center:[p.lng,p.lat], zoom:15, duration:900 });
}

// ── TRACKING ─────────────────────────────────────────────
document.getElementById('btn-track').addEventListener('click', () => {
  tracking ? stopTracking() : startTracking();
});

function startTracking() {
  if (!navigator.geolocation) { alert('Geolocation not available.'); return; }
  document.getElementById('welcome').classList.remove('visible');
  tracking  = true;
  startTime = startTime || Date.now();
  const btn = document.getElementById('btn-track');
  btn.textContent = 'Stop Tracking';
  btn.classList.add('active');

  // Make stats glow green while live
  document.querySelectorAll('.stat-val').forEach(el => el.classList.add('live'));

  timerId = setInterval(tickTimer, 1000);
  watchId = navigator.geolocation.watchPosition(onPos, onGeoErr,
    { enableHighAccuracy:true, maximumAge:3000 });
  tickId  = setInterval(() => { if (currentPos) logPoint(currentPos); }, TICK);

  navigator.geolocation.getCurrentPosition(pos => {
    currentPos = pos; logPoint(pos);
    map.flyTo({ center:[pos.coords.longitude, pos.coords.latitude], zoom:16, duration:700 });
  }, onGeoErr, { enableHighAccuracy:true });
}

function stopTracking() {
  tracking = false;
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  clearInterval(tickId); clearInterval(timerId);
  const btn = document.getElementById('btn-track');
  btn.textContent = 'Resume Tracking';
  btn.classList.remove('active');
  document.querySelectorAll('.stat-val').forEach(el => el.classList.remove('live'));
}

function onPos(pos) {
  currentPos = pos;
  const { longitude:lng, latitude:lat } = pos.coords;
  if (!dot) {
    const el = document.createElement('div');
    el.className = 'pulse-dot';
    dot = new mapboxgl.Marker({ element:el }).setLngLat([lng,lat]).addTo(map);
  } else { dot.setLngLat([lng,lat]); }
  if (followMode) map.easeTo({ center:[lng,lat], duration:700 });
}

function logPoint(pos) {
  const { longitude:lng, latitude:lat } = pos.coords;
  points.push({ lng, lat, ts:Date.now() });
  saveDay(activeDay, points);
  buildStrip(); renderTrail(); updateStats();
}

function onGeoErr(e) { console.warn('GPS:', e.message); }

// ── FOLLOW ───────────────────────────────────────────────
const btnFollow = document.getElementById('btn-follow');
btnFollow.addEventListener('click', () => {
  followMode = !followMode;
  btnFollow.classList.toggle('on', followMode);
  btnFollow.textContent = followMode ? '📍' : '🗺️';
  if (followMode && currentPos)
    map.easeTo({ center:[currentPos.coords.longitude, currentPos.coords.latitude], duration:600 });
});

map.on('dragstart', () => {
  if (followMode) {
    followMode = false;
    btnFollow.classList.remove('on');
    btnFollow.textContent = '🗺️';
  }
});

// ── UNITS ────────────────────────────────────────────────
document.getElementById('btn-units').addEventListener('click', () => {
  metric = !metric;
  localStorage.setItem('fp_units', metric ? 'km' : 'mi');
  updateUnits(); updateStats();
});

function updateUnits() {
  const btn = document.getElementById('btn-units');
  btn.textContent = metric ? 'KM' : 'MI';
  btn.classList.toggle('on', !metric);
  document.getElementById('stat-dist-lbl').textContent = uLbl();
}

// ── PLACES ───────────────────────────────────────────────
const btnPlaces  = document.getElementById('btn-places');
const placeSheet = document.getElementById('place-sheet');
const placeInput = document.getElementById('place-input');
const overlay    = document.getElementById('place-overlay');

function openSheet() {
  placeInput.value = '';
  document.getElementById('place-coords').textContent =
    pendingLL ? `📍 ${pendingLL.lat.toFixed(5)}, ${pendingLL.lng.toFixed(5)}` : '';
  placeSheet.classList.add('open');
  overlay.classList.add('show');
  setTimeout(() => placeInput.focus(), 350);
}

function closeSheet() {
  placeSheet.classList.remove('open');
  overlay.classList.remove('show');
  btnPlaces.classList.remove('on');
  btnPlaces.textContent = '📌';
  pendingLL = null;
}

// Three ways to close: overlay, ✕ button, Cancel button
overlay.addEventListener('click', closeSheet);
document.getElementById('sheet-x').addEventListener('click', closeSheet);
document.getElementById('place-cancel').addEventListener('click', closeSheet);

btnPlaces.addEventListener('click', () => {
  if (placeSheet.classList.contains('open')) { closeSheet(); return; }
  btnPlaces.classList.add('on');

  if (currentPos) {
    pendingLL = { lng: currentPos.coords.longitude, lat: currentPos.coords.latitude };
    openSheet();
  } else {
    btnPlaces.textContent = '⏳';
    navigator.geolocation.getCurrentPosition(pos => {
      btnPlaces.textContent = '📌';
      pendingLL = { lng: pos.coords.longitude, lat: pos.coords.latitude };
      openSheet();
    }, () => {
      btnPlaces.textContent = '📌';
      btnPlaces.classList.remove('on');
      alert('Location not available. Start tracking first so the app knows where you are.');
    }, { enableHighAccuracy:true, timeout:8000 });
  }
});

document.getElementById('place-save').addEventListener('click', () => {
  const name = placeInput.value.trim();
  if (!name) { placeInput.focus(); return; }
  if (!pendingLL) { closeSheet(); return; }

  const place = { id:Date.now(), name, lng:pendingLL.lng, lat:pendingLL.lat };
  places.push(place);
  savePlaces();
  addPlaceMarker(place);
  map.flyTo({ center:[place.lng, place.lat], zoom:16, duration:700 });
  closeSheet();
});

// ── PLACE MARKERS ────────────────────────────────────────
function drawPlaces() {
  pMarkers.forEach(m => m.remove());
  pMarkers = [];
  places.forEach(addPlaceMarker);
}

function addPlaceMarker(place) {
  const el = document.createElement('div');
  el.className = 'pmarker';
  el.textContent = '📌';

  const m = new mapboxgl.Marker({ element:el, anchor:'bottom' })
    .setLngLat([place.lng, place.lat])
    .addTo(map);

  el.addEventListener('click', e => {
    e.stopPropagation();
    const pp = document.getElementById('place-popup');
    pp.style.display = 'block';
    pp.style.left = Math.min(e.clientX + 12, window.innerWidth - 200) + 'px';
    pp.style.top  = Math.max(e.clientY - 90, 10) + 'px';
    document.getElementById('pop-name').textContent   = place.name;
    document.getElementById('pop-coords').textContent =
      `${place.lat.toFixed(4)}, ${place.lng.toFixed(4)}`;
    document.getElementById('pop-del').onclick = () => {
      places = places.filter(p => p.id !== place.id);
      savePlaces(); drawPlaces();
      pp.style.display = 'none';
    };
  });

  pMarkers.push(m);
}

map.on('click', () => {
  document.getElementById('place-popup').style.display = 'none';
});

// ── CLEAR ────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm("Clear today's trail?")) return;
  points = [];
  saveDay(activeDay, points);
  map.getSource('trail').setData(fc([]));
  map.getSource('dwell').setData(fc([]));
  document.getElementById('dwell-badge').classList.remove('visible');
  startTime = null;
  document.getElementById('stat-time').textContent = '—';
  if (tracking) stopTracking();
  document.getElementById('btn-track').textContent = 'Start Tracking';
  document.getElementById('welcome').classList.add('visible');
  buildStrip(); updateStats();
});

// ── WELCOME CLOSE ────────────────────────────────────────
document.getElementById('welcome-close').addEventListener('click', () => {
  document.getElementById('welcome').classList.remove('visible');
});

// ── STATS ────────────────────────────────────────────────
function updateStats() {
  const km = calcKm();
  document.getElementById('stat-pts').textContent  = points.length;
  document.getElementById('stat-dist').textContent =
    points.length < 2 ? '—' : toDisp(km).toFixed(2);
}

function calcKm() {
  let d = 0;
  for (let i = 1; i < points.length; i++) d += haversine(points[i-1], points[i]);
  return d;
}

function haversine(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 +
            Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function tickTimer() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  document.getElementById('stat-time').textContent =
    h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}
</script>
