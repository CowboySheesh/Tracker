/* ── DESIGN TOKENS ── */
:root{
  --lime:   #C8FF00;   /* action / go */
  --red:    #FF3333;   /* stop / delete */
  --amber:  #FF9F00;   /* places / pins */
  --black:  #0A0A0A;
  --dark:   #141414;   /* panels — fully opaque */
  --panel:  #1E1E1E;   /* cards — fully opaque */
  --line:   #2A2A2A;   /* borders */
  --white:  #FFFFFF;
  --offwhite:#F0F0F0;
  --gray:   #888888;
  --r:      10px;
}

html,body{
  height:100%;width:100%;
  background:var(--black);
  font-family:'Barlow',sans-serif;
  color:var(--white);
  overflow:hidden;
}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:0;}

/* ══════════════════════════════
   TOP BAR  — fully opaque strip
══════════════════════════════ */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  background:var(--dark);
  border-bottom:2px solid var(--lime);
  padding:10px 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
  /* NO backdrop-filter — opaque solid bar, always readable */
}

#logo{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:22px;
  letter-spacing:4px;
  color:var(--lime);
  text-transform:uppercase;
}

#stats{display:flex;gap:20px;align-items:center;}

.stat{text-align:right;}
.stat-n{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:20px;
  color:var(--white);line-height:1;
  transition:color .25s;
}
.stat-n.live{color:var(--lime);}
.stat-n.muted{color:var(--gray);}
.stat-u{
  font-family:'Barlow',sans-serif;
  font-weight:600;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gray);margin-top:2px;
}

/* ══════════════════════════════
   DAY CHIPS  — opaque pill row
══════════════════════════════ */
#chipbar{
  position:fixed;top:58px;left:0;right:0;z-index:20;
  background:var(--dark);
  border-bottom:1px solid var(--line);
  padding:8px 14px;
  display:flex;gap:8px;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#chipbar::-webkit-scrollbar{display:none;}

.chip{
  flex-shrink:0;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:13px;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 16px;border-radius:20px;
  border:1.5px solid var(--line);
  background:var(--panel);
  color:var(--gray);
  cursor:pointer;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  transition:all .15s;
}
.chip.data{border-color:rgba(200,255,0,.4);color:var(--offwhite);}
.chip.active{background:var(--lime);border-color:var(--lime);color:#000;font-weight:900;}

/* ══════════════════════════════
   PAST TRAIL BANNER
══════════════════════════════ */
#pastbanner{
  position:fixed;top:114px;left:0;right:0;z-index:20;
  background:#2A0000;
  border-bottom:2px solid var(--red);
  padding:6px;
  text-align:center;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:12px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--red);
  display:none;
}
#pastbanner.on{display:block;}

/* ══════════════════════════════
   MAP AREA  — space between bars
══════════════════════════════ */
#maparea{
  position:fixed;
  top:110px;   /* below chipbar */
  bottom:90px; /* above controls */
  left:0;right:0;
  z-index:1;   /* clicks pass through to map */
  pointer-events:none;
}

/* ══════════════════════════════
   SIDE FABS
══════════════════════════════ */
.fab{
  position:fixed;z-index:20;
  width:50px;height:50px;border-radius:50%;
  background:var(--panel);
  border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.7);
}
.fab:active{transform:scale(.88);}

#fab-follow{bottom:168px;right:14px;}
#fab-follow svg{width:22px;height:22px;fill:var(--gray);}
#fab-follow.on svg{fill:var(--lime);}
#fab-follow.on{border-color:var(--lime);}

#fab-units{
  bottom:108px;right:14px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:14px;
  letter-spacing:1px;color:var(--offwhite);
}
#fab-units.on{border-color:var(--amber);color:var(--amber);}

#fab-pin{bottom:108px;left:14px;}
#fab-pin svg{width:22px;height:22px;fill:var(--gray);}
#fab-pin.on svg{fill:var(--amber);}
#fab-pin.on{border-color:var(--amber);}

/* dwell */
#dwell{
  position:fixed;bottom:168px;left:14px;z-index:20;
  background:var(--panel);
  border:1.5px solid var(--lime);
  border-radius:8px;padding:6px 12px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:13px;letter-spacing:1px;
  color:var(--lime);display:none;
}
#dwell.on{display:block;}

/* ══════════════════════════════
   BOTTOM CONTROL BAR — opaque
══════════════════════════════ */
#ctrlbar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:var(--dark);
  border-top:1px solid var(--line);
  padding:10px 14px 32px;
  display:flex;gap:10px;
}

/* CLEAR — red, solid, readable */
#btn-clear{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:13px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--red);
  background:#200000;
  border:1.5px solid var(--red);
  border-radius:var(--r);
  padding:0 18px;
  cursor:pointer;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  min-height:52px;
  transition:background .15s;
}
#btn-clear:active{background:#330000;}
#btn-clear:disabled{opacity:.2;pointer-events:none;}

/* MAIN ACTION — lime green, black text, always visible */
#btn-action{
  flex:1;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:18px;
  letter-spacing:3px;text-transform:uppercase;
  color:#000;
  background:var(--lime);
  border:none;border-radius:var(--r);
  min-height:52px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .2s,box-shadow .2s;
  box-shadow:0 0 24px rgba(200,255,0,.45),0 4px 16px rgba(200,255,0,.25);
  animation:pulse-green 2.6s ease-in-out infinite;
}
@keyframes pulse-green{
  0%,100%{box-shadow:0 0 20px rgba(200,255,0,.4),0 4px 14px rgba(200,255,0,.2);}
  50%    {box-shadow:0 0 36px rgba(200,255,0,.75),0 6px 28px rgba(200,255,0,.4);}
}
#btn-action:active{transform:scale(.97);}
#btn-action:disabled{opacity:.2;pointer-events:none;animation:none;box-shadow:none;}

/* STOP state */
#btn-action.stop{
  background:var(--red);color:#fff;
  animation:pulse-red 2.6s ease-in-out infinite;
}
@keyframes pulse-red{
  0%,100%{box-shadow:0 0 20px rgba(255,51,51,.4),0 4px 14px rgba(255,51,51,.2);}
  50%    {box-shadow:0 0 36px rgba(255,51,51,.75),0 6px 28px rgba(255,51,51,.4);}
}

/* ══════════════════════════════
   GPS PULSE DOT
══════════════════════════════ */
.gps-dot{
  width:16px;height:16px;border-radius:50%;
  background:var(--lime);
  border:3px solid var(--black);
  animation:gps-ring 2s infinite;
}
@keyframes gps-ring{
  0%  {box-shadow:0 0 0 0 rgba(200,255,0,.7);}
  70% {box-shadow:0 0 0 14px rgba(200,255,0,0);}
  100%{box-shadow:0 0 0 0 rgba(200,255,0,0);}
}

/* ══════════════════════════════
   WELCOME MODAL — fully opaque
══════════════════════════════ */
#welcome-wrap{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}
#welcome-wrap.hide{display:none;}

#welcome-card{
  background:var(--panel);   /* solid #1E1E1E — no transparency */
  border:2px solid var(--lime);
  border-radius:16px;
  padding:28px 24px 22px;
  max-width:300px;width:88vw;
  text-align:center;
}
#welcome-card h2{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;font-size:28px;letter-spacing:5px;
  color:var(--lime);text-transform:uppercase;
  margin-bottom:16px;
}
#welcome-card p{
  font-size:14px;line-height:1.75;
  color:var(--offwhite);
}
#welcome-card p strong{color:var(--white);font-weight:600;}
#welcome-ok{
  display:inline-block;margin-top:20px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:13px;letter-spacing:3px;
  color:var(--lime);text-transform:uppercase;
  cursor:pointer;opacity:.75;
  -webkit-tap-highlight-color:transparent;
}

/* ══════════════════════════════
   PIN SHEET — slides from bottom
══════════════════════════════ */
#pin-bg{
  position:fixed;inset:0;z-index:28;
  background:rgba(0,0,0,.65);
  display:none;
}
#pin-bg.on{display:block;}

#pin-sheet{

  border-top:2px solid var(--amber);
  border-radius:20px 20px 0 0;

#pin-title{

<script>
/* ── CONFIG ─────────────────────────── */
const TOKEN   = 'pk.eyJ1IjoidW5jb21tb25jb3dib3kiLCJhIjoiY21rNjN2c2R1MHFodjNkb2wybWxweGNvNyJ9.4j78jvsPEWDh-T19ZSeqMA';
const TICK    = 8000;
const MAXDAYS = 14;
const PLKEY   = 'fp_places_v1';

/* ── UNITS ──────────────────────────── */
let metric = localStorage.getItem('fp_units') !== 'mi';
const toD  = km => metric ? km : km * 0.621371;
const uLbl = ()  => metric ? 'KM' : 'MI';

/* ── DATE ───────────────────────────── */
const pad = n => String(n).padStart(2,'0');

function todayKey(){
  const d = new Date();
  return `fp_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function chipLabel(key){
  const [y,m,d] = key.replace('fp_','').split('-').map(Number);
  const dt  = new Date(y,m-1,d);
  const now = new Date(); now.setHours(0,0,0,0);
  const df  = Math.round((now-dt)/86400000);
  if(df===0) return 'Today';
  if(df===1) return 'Yesterday';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function allKeys(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('fp_')&&!k.includes('places')&&!k.includes('units')) out.push(k);
  }
  return out.sort().reverse();
}
function loadDay(k){ try{const r=localStorage.getItem(k);return r?JSON.parse(r):[]}catch{return[];} }
function saveDay(k,pts){
  try{localStorage.setItem(k,JSON.stringify(pts));}catch{}
  const ks=allKeys(); if(ks.length>MAXDAYS) ks.slice(MAXDAYS).forEach(x=>localStorage.removeItem(x));
}

/* ── PLACES ─────────────────────────── */
let places=[];
try{places=JSON.parse(localStorage.getItem(PLKEY)||'[]');}catch{}
const savePlaces=()=>{try{localStorage.setItem(PLKEY,JSON.stringify(places));}catch{}};

/* ── STATE ──────────────────────────── */
let tracking=false, follow=true;
let watchId=null, tickId=null, timerId=null;
let startT=null, curPos=null, dotM=null, pendLL=null, pinMs=[];
let activeDay=todayKey(), pts=loadDay(todayKey());

/* ── MAP ────────────────────────────── */
mapboxgl.accessToken = TOKEN;
const map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/dark-v11',
  center:[-80.19,25.77], zoom:14,
  attributionControl:false
});
map.addControl(new mapboxgl.AttributionControl({compact:true}),'bottom-right');

map.on('load',()=>{
  addLayers();
  buildChips();
  renderPins();
  if(pts.length>1){drawTrail();flyEnd();}
  refreshStats();
  syncUnits();
});

/* ── LAYERS ─────────────────────────── */
function addLayers(){
  map.addSource('trail',{type:'geojson',data:fc([])});
  map.addLayer({id:'trail-glow',type:'line',source:'trail',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#C8FF00','line-width':['*',['get','w'],5],'line-opacity':.15,'line-blur':16}});
  map.addLayer({id:'trail-core',type:'line',source:'trail',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#C8FF00','line-width':['get','w'],'line-opacity':.92}});
  map.addSource('dwell',{type:'geojson',data:fc([])});
  map.addLayer({id:'dwell-halo',type:'circle',source:'dwell',
    paint:{
      'circle-radius':['interpolate',['linear'],['get','n'],1,12,10,54],
      'circle-color':'#C8FF00',
      'circle-opacity':['interpolate',['linear'],['get','n'],1,.06,10,.22],
      'circle-blur':1.5
    }},'trail-glow');
}
const fc=f=>({type:'FeatureCollection',features:f});

/* ── CHIP BAR ───────────────────────── */
function buildChips(){
  const bar=document.getElementById('chipbar');
  bar.innerHTML='';
  const keys=allKeys();
  if(!keys.includes(todayKey())) keys.unshift(todayKey());
  keys.forEach(k=>{
    const b=document.createElement('button');
    b.className='chip';
    b.textContent=chipLabel(k);
    b.dataset.k=k;
    if(loadDay(k).length) b.classList.add('data');
    if(k===activeDay)     b.classList.add('active');
    b.addEventListener('click',()=>switchDay(k));
    bar.appendChild(b);
  });
}
function switchDay(k){
  if(tracking) stopTracking();
  activeDay=k; pts=loadDay(k); startT=null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.k===k));
  const isT=k===todayKey();
  document.getElementById('pastbanner').classList.toggle('on',!isT);
  document.getElementById('btn-action').disabled=!isT;
  document.getElementById('btn-clear').disabled=!isT;
  document.querySelectorAll('.stat-n').forEach(e=>e.classList.toggle('muted',!isT));
  map.getSource('trail').setData(fc([]));
  map.getSource('dwell').setData(fc([]));
  document.getElementById('dwell').classList.remove('on');
  document.getElementById('s-time').textContent='—';
  if(pts.length>1){drawTrail();flyEnd();}
  refreshStats();
}

/* ── TRAIL ──────────────────────────── */
function drawTrail(){
  if(pts.length<2) return;
  const segs=[],dm={};
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1],k=dk(a);
    dm[k]=(dm[k]||0)+1;
    segs.push({type:'Feature',geometry:{type:'LineString',coordinates:[[a.lng,a.lat],[b.lng,b.lat]]},properties:{w:Math.min(2.5+(dm[k]||1)*.9,14)}});
  }
  map.getSource('trail').setData(fc(segs));
  map.getSource('dwell').setData(fc(Object.entries(dm).map(([k,n])=>{
    const[lat,lng]=k.split(',').map(Number);
    return{type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]},properties:{n}};
  })));
  const mx=Math.max(...Object.values(dm));
  if(mx>2){
    document.getElementById('dwell').classList.add('on');
    document.getElementById('dwell-val').textContent=`${mx} passes`;
  }
}
function dk(p){const r=.00015;return`${(Math.round(p.lat/r)*r).toFixed(5)},${(Math.round(p.lng/r)*r).toFixed(5)}`;}
function flyEnd(){if(!pts.length)return;const p=pts[pts.length-1];map.flyTo({center:[p.lng,p.lat],zoom:16,duration:900});}

/* ── TRACKING ───────────────────────── */
document.getElementById('btn-action').addEventListener('click',()=>tracking?stopTracking():startTracking());

function startTracking(){
  if(!navigator.geolocation){alert('Geolocation unavailable.');return;}
  closeWelcome();
  tracking=true; startT=startT||Date.now();
  const btn=document.getElementById('btn-action');
  btn.textContent='Stop Tracking'; btn.classList.add('stop');
  document.querySelectorAll('.stat-n').forEach(e=>{e.classList.add('live');e.classList.remove('muted');});
  timerId=setInterval(tickTime,1000);
  watchId=navigator.geolocation.watchPosition(onPos,geoErr,{enableHighAccuracy:true,maximumAge:3000});
  tickId=setInterval(()=>{if(curPos)logPt(curPos);},TICK);
  navigator.geolocation.getCurrentPosition(p=>{curPos=p;logPt(p);map.flyTo({center:[p.coords.longitude,p.coords.latitude],zoom:17,duration:700});},geoErr,{enableHighAccuracy:true});
}
function stopTracking(){
  tracking=false;
  if(watchId!==null) navigator.geolocation.clearWatch(watchId);
  clearInterval(tickId); clearInterval(timerId);
  const btn=document.getElementById('btn-action');
  btn.textContent='Resume Tracking'; btn.classList.remove('stop');
  document.querySelectorAll('.stat-n').forEach(e=>e.classList.remove('live'));
}
function onPos(pos){
  curPos=pos;
  const{longitude:lng,latitude:lat}=pos.coords;
  if(!dotM){
    const el=document.createElement('div'); el.className='gps-dot';
    dotM=new mapboxgl.Marker({element:el}).setLngLat([lng,lat]).addTo(map);
  } else dotM.setLngLat([lng,lat]);
  if(follow) map.easeTo({center:[lng,lat],duration:700});
}
function logPt(pos){
  const{longitude:lng,latitude:lat}=pos.coords;
  pts.push({lng,lat,ts:Date.now()});
  saveDay(activeDay,pts); buildChips(); drawTrail(); refreshStats();
}
function geoErr(e){console.warn('GPS:',e.message);}

/* ── FOLLOW ─────────────────────────── */
const fabFollow=document.getElementById('fab-follow');
fabFollow.addEventListener('click',()=>{
  follow=!follow;
  fabFollow.classList.toggle('on',follow);
  if(follow&&curPos) map.easeTo({center:[curPos.coords.longitude,curPos.coords.latitude],duration:600});
});
map.on('dragstart',()=>{if(follow){follow=false;fabFollow.classList.remove('on');}});

/* ── UNITS ──────────────────────────── */
document.getElementById('fab-units').addEventListener('click',()=>{
  metric=!metric;
  localStorage.setItem('fp_units',metric?'km':'mi');
  syncUnits(); refreshStats();
});
function syncUnits(){
  const b=document.getElementById('fab-units');
  b.textContent=uLbl();
  b.classList.toggle('on',!metric);
  document.getElementById('s-unit').textContent=uLbl();
}

/* ── STATS ──────────────────────────── */
function refreshStats(){
  let d=0;
  for(let i=1;i<pts.length;i++) d+=hav(pts[i-1],pts[i]);
  document.getElementById('s-pts').textContent=pts.length;
  document.getElementById('s-dist').textContent=pts.length<2?'—':toD(d).toFixed(2);
}
function hav(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function tickTime(){
  if(!startT) return;
  const s=Math.floor((Date.now()-startT)/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  document.getElementById('s-time').textContent=h?`${h}:${pad(m)}:${pad(sc)}`:`${pad(m)}:${pad(sc)}`;
}

/* ── PINS ───────────────────────────── */
const fabPin    = document.getElementById('fab-pin');
const pinSheet  = document.getElementById('pin-sheet');
const pinBg     = document.getElementById('pin-bg');
const pinInput  = document.getElementById('pin-input');

function openPinSheet(){
  pinInput.value='';
  document.getElementById('pin-coords').textContent=
    pendLL?`${pendLL.lat.toFixed(5)}, ${pendLL.lng.toFixed(5)}`:'';
  pinSheet.classList.add('up'); pinBg.classList.add('on');
  setTimeout(()=>pinInput.focus(),340);
}
function closePinSheet(){
  pinSheet.classList.remove('up'); pinBg.classList.remove('on');
  fabPin.classList.remove('on'); fabPin.querySelector('svg').style.fill='';
  pendLL=null;
}

pinBg.addEventListener('click',closePinSheet);
document.getElementById('pin-x').addEventListener('click',closePinSheet);
document.getElementById('pin-cancel').addEventListener('click',closePinSheet);

fabPin.addEventListener('click',()=>{
  if(pinSheet.classList.contains('up')){closePinSheet();return;}
  fabPin.classList.add('on');
  if(curPos){
    pendLL={lng:curPos.coords.longitude,lat:curPos.coords.latitude};
    openPinSheet();
  } else {
    fabPin.querySelector('svg').style.opacity='.4';
    navigator.geolocation.getCurrentPosition(pos=>{
      fabPin.querySelector('svg').style.opacity='';
      pendLL={lng:pos.coords.longitude,lat:pos.coords.latitude};
      openPinSheet();
    },()=>{
      fabPin.classList.remove('on');
      alert('Location unavailable. Start tracking first.');
    },{enableHighAccuracy:true,timeout:8000});
  }
});

document.getElementById('pin-save').addEventListener('click',()=>{
  const name=pinInput.value.trim();
  if(!name){pinInput.focus();return;}
  if(!pendLL){closePinSheet();return;}
  const pl={id:Date.now(),name,lng:pendLL.lng,lat:pendLL.lat};
  places.push(pl); savePlaces(); addPinMarker(pl);
  map.flyTo({center:[pl.lng,pl.lat],zoom:17,duration:700});
  closePinSheet();
});

/* ── PIN MARKERS ────────────────────── */
function renderPins(){pinMs.forEach(m=>m.remove());pinMs=[];places.forEach(addPinMarker);}
function addPinMarker(pl){
  const el=document.createElement('div'); el.className='pinmark'; el.textContent='📍';
  const m=new mapboxgl.Marker({element:el,anchor:'bottom'}).setLngLat([pl.lng,pl.lat]).addTo(map);
  el.addEventListener('click',e=>{
    e.stopPropagation();
    const pp=document.getElementById('pin-popup');
    pp.style.display='block';
    pp.style.left=Math.min(e.clientX+12,window.innerWidth-200)+'px';
    pp.style.top=Math.max(e.clientY-110,10)+'px';
    document.getElementById('pp-name').textContent=pl.name;
    document.getElementById('pp-coords').textContent=`${pl.lat.toFixed(4)}, ${pl.lng.toFixed(4)}`;
    document.getElementById('pp-del').onclick=()=>{
      places=places.filter(p=>p.id!==pl.id);
      savePlaces(); renderPins(); pp.style.display='none';
    };
  });
  pinMs.push(m);
}
map.on('click',()=>{document.getElementById('pin-popup').style.display='none';});

/* ── CLEAR ──────────────────────────── */
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!confirm("Clear today's trail?")) return;
  pts=[]; saveDay(activeDay,pts);
  map.getSource('trail').setData(fc([]));
  map.getSource('dwell').setData(fc([]));
  document.getElementById('dwell').classList.remove('on');
  startT=null; document.getElementById('s-time').textContent='—';
  if(tracking) stopTracking();
  document.getElementById('btn-action').textContent='Start Tracking';
  buildChips(); refreshStats();
});

/* ── WELCOME ────────────────────────── */
function closeWelcome(){document.getElementById('welcome-wrap').classList.add('hide');}
document.getElementById('welcome-ok').addEventListener('click',closeWelcome);
</script>
